<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes in the Fabric</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.03); 
            --blur: blur(20px) saturate(150%);
            --glow: rgba(0, 212, 255, 0.5);
            --border: rgba(0, 212, 255, 0.2);
            --accent: #00d4ff;
            --text-muted: #aaa;
        }   

        body {
            background: 
                url('images/sand.png') repeat-x bottom / auto 200px,
                url('images/space.png') no-repeat center / cover,
                radial-gradient(circle at center, #1a1a1f 0%, #050505 100%);
            background-attachment: scroll, fixed, fixed;
            color: #eee; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        .container { 
            width: 900px;
            max-width: calc(100% - 40px);
            padding: 60px 40px 200px 40px; 
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px var(--glow);
            font-weight: 700;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .chapter-card {
            background: var(--glass);
            backdrop-filter: var(--blur); 
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease, border 0.3s ease;
        }

        .chapter-card:hover {
            transform: translateY(-5px);
            border: 1px solid var(--accent);
            box-shadow: 0 12px 40px 0 rgba(0, 212, 255, 0.15);
        }

        .render-img { 
            width: 100%; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1);
            transition: filter 0.3s ease;
        }

        .chapter-card:hover .render-img {
            filter: brightness(1.1);
        }

        h2 { 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: var(--accent); 
            margin-top: 0;
            text-shadow: 0 0 8px var(--glow);
        }

        p {
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 300;
        }

        #active-chapter-title {
            min-height: 1.2em; /* Ensures space for long titles like Chapter 6 */
        }

        #active-chapter-desc {
            min-height: 3.5em; /* Matches the initial Introduction text height */
        }

        .browse-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .browse-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--glow);
        }

        /* Modal Styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 800px;
            max-width: 90%;
            max-height: 80vh;
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .toc-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            list-style: none;
            padding: 0;
        }

        .toc-grid li a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s, padding-left 0.2s;
            display: block;
        }

        .toc-grid li a:hover {
            color: var(--accent);
            padding-left: 5px;
            cursor: pointer;
        }

        .toc-grid li a.active {
            color: var(--accent);
            padding-left: 10px;
            font-weight: 600;
            border-left: 2px solid var(--accent);
        }

        audio { 
            width: 100%; 
            margin-top: 15px; 
            filter: invert(100%) hue-rotate(180deg) brightness(1.2) contrast(0.9);
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1;
        }

        .player-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .bookmark-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .bookmark-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Echoes in the Fabric</h1>
        
        <div class="chapter-card" id="introduction">
            <img src="images/intro_render.png" class="render-img" alt="World of Dorin">
            <div>
                <h2 id="active-chapter-title">Introduction</h2>
                <p id="active-chapter-desc">On the distant world of Dorin, life clings to existence within sprawling, self-sustaining domed cities like Veridia...</p>
                <div class="player-container">
                    <audio id="main-audio-player" controls src="audio/intro.mp3"></audio>
                    <audio id="bgm-player" loop style="display:none;"></audio>
                    <button class="bookmark-btn" onclick="setManualBookmark()" title="Save current position">🔖 Bookmark</button>
                    <button class="bookmark-btn" onclick="loadManualBookmark(event)" title="Load saved position">📂 Load</button>
                </div>
                
                <div id="comic-viewer-container" style="margin-top: 20px; text-align: center; display: none;">
                    <img id="comic-img" src="" alt="Chapter Visual" style="width: 100%; height: 500px; object-fit: contain; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: opacity 0.3s ease;">
                </div>

                <button class="browse-btn" onclick="toggleModal(true)">Explore Chapters</button>
            </div>
        </div>
    </div>

    <!-- Modal TOC -->
    <div id="toc-modal" class="modal-overlay" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="margin: 0;">Chapter Manifest</h2>
                <a onclick="loadIntro()" style="color: var(--accent); cursor: pointer; font-size: 0.7rem; text-transform: uppercase; text-decoration: none; opacity: 0.8;">&larr; Reset Intro</a>
            </div>
            
            <ul class="toc-grid" id="toc-grid">
                <!-- Chapters populated by script -->
            </ul>

            <div style="text-align: center; margin-top: 30px;">
                <button class="browse-btn" style="width: auto;" onclick="toggleModal(false)">Close</button>
            </div>
        </div>
    </div>

    <script>
        let chapters = [];
        let chapterMilestones = {};
        let bgmTracks = {};

        async function init() {
            try {
                const response = await fetch('chapters.txt');
                const text = await response.text();
                // Split by line, trim whitespace, and filter out any empty lines
                chapters = text.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                
                const grid = document.getElementById('toc-grid');
                grid.innerHTML = chapters.map((title, index) => {
                    const num = index + 1;
                    const escapedTitle = title.replace(/'/g, "\\'");
                    return `<li><a id="toc-ch-${num}" onclick="loadChapter(${num}, '${escapedTitle}')">${num.toString().padStart(2, '0')}. ${title}</a></li>`;
                }).join('');

                try {
                    const msResponse = await fetch('milestones.json');
                    if (msResponse.ok) {
                        chapterMilestones = await msResponse.json();
                    }
                    const bRes = await fetch('bgm.json');
                    if (bRes.ok) {
                        bgmTracks = await bRes.json();
                    }
                } catch (e) {
                    console.error("Failed to load data:", e);
                }

                // Restore last active chapter
                try {
                    const lastActive = localStorage.getItem('lastActiveChapter');
                    if (lastActive) {
                        const data = JSON.parse(lastActive);
                        if (data.type === 'intro') {
                            loadIntro(false);
                        } else if (data.type === 'chapter') {
                            loadChapter(data.num, data.title, false);
                        }
                    }
                } catch (e) {
                    console.error("Failed to restore last chapter:", e);
                }
            } catch (err) {
                console.error("Manifest failed to initialize:", err);
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('toc-modal');
            modal.style.display = show ? 'flex' : 'none';
        }

        function updateActiveStatus(id) {
            document.querySelectorAll('.toc-grid a').forEach(a => a.classList.remove('active'));
            if (id) {
                const activeLink = document.getElementById(id);
                if (activeLink) activeLink.classList.add('active');
            }
        }

        function loadChapter(num, title, autoPlay = true) {
            const player = document.getElementById('main-audio-player');
            const titleDisplay = document.getElementById('active-chapter-title');
            const descDisplay = document.getElementById('active-chapter-desc');
            const audioSrc = `audio/chapter${num}.mp3`;

            localStorage.setItem('lastActiveChapter', JSON.stringify({ type: 'chapter', num: num, title: title }));

            // Feature 1: Load Bookmark (Wait for metadata to ensure currentTime can be set)
            player.onloadedmetadata = () => {
                const savedTime = localStorage.getItem(`bookmark_${audioSrc}`);
                if (savedTime) player.currentTime = parseFloat(savedTime);
                player.onloadedmetadata = null;
            };

            player.src = audioSrc;
            titleDisplay.innerText = `Chapter ${num}: ${title}`;
            descDisplay.innerText = `You are now listening to the audio broadcast of Chapter ${num}.`;
            
            document.getElementById('comic-viewer-container').style.display = 'none';

            updateActiveStatus(`toc-ch-${num}`);

            toggleModal(false);
            if (autoPlay) {
                player.play();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function loadIntro(autoPlay = true) {
            const player = document.getElementById('main-audio-player');
            const titleDisplay = document.getElementById('active-chapter-title');
            const descDisplay = document.getElementById('active-chapter-desc');
            const audioSrc = `audio/intro.mp3`;

            localStorage.setItem('lastActiveChapter', JSON.stringify({ type: 'intro' }));

            // Feature 1: Load Bookmark (Wait for metadata to ensure currentTime can be set)
            player.onloadedmetadata = () => {
                const savedTime = localStorage.getItem(`bookmark_${audioSrc}`);
                if (savedTime) player.currentTime = parseFloat(savedTime);
                player.onloadedmetadata = null;
            };

            player.src = audioSrc;
            titleDisplay.innerText = `Introduction`;
            descDisplay.innerText = `On the distant world of Dorin, life clings to existence within sprawling, self-sustaining domed cities like Veridia...`;

            document.getElementById('comic-viewer-container').style.display = 'none';

            updateActiveStatus(null);
            toggleModal(false);
            if (autoPlay) {
                player.play();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function setManualBookmark() {
            const player = document.getElementById('main-audio-player');
            const btn = document.querySelector('.bookmark-btn');
            const currentSrc = player.getAttribute('src');
            
            localStorage.setItem(`bookmark_${currentSrc}`, player.currentTime);
            
            // Visual feedback
            const originalText = btn.innerText;
            btn.innerText = "Saved!";
            btn.style.borderColor = "#fff";
            setTimeout(() => { btn.innerText = originalText; btn.style.borderColor = ""; }, 2000);
        }

        function loadManualBookmark(e) {
            const player = document.getElementById('main-audio-player');
            const currentSrc = player.getAttribute('src');
            const savedTime = localStorage.getItem(`bookmark_${currentSrc}`);
            
            if (savedTime) {
                player.currentTime = parseFloat(savedTime);
                player.play();
                
                // Visual feedback
                const btn = e.currentTarget;
                const originalText = btn.innerText;
                btn.innerText = "Loaded!";
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            } else {
                alert("No bookmark found for this track.");
            }
        }

        init();

        // Handle Audio Events
        const mainPlayer = document.getElementById('main-audio-player');
        const comicImg = document.getElementById('comic-img');
        const comicContainer = document.getElementById('comic-viewer-container');

        mainPlayer.addEventListener('timeupdate', () => {
            const currentTime = mainPlayer.currentTime;
            const currentSrc = mainPlayer.getAttribute('src');

            // Feature 1: Save Bookmark every update
            localStorage.setItem(`bookmark_${currentSrc}`, currentTime);

            // Feature 2: Sync-to-Audio Comic Feature
            const milestones = chapterMilestones[currentSrc];
            if (milestones) {
                // Find the latest milestone that has passed
                const activeMilestone = milestones
                    .filter(m => m.time <= currentTime)
                    .pop();
                
                if (activeMilestone) {
                    comicContainer.style.display = 'block';
                    if (comicImg.src.indexOf(activeMilestone.img) === -1) {
                        if (!comicImg.getAttribute('src')) {
                            // First load, no fade needed
                            comicImg.src = activeMilestone.img;
                            comicImg.style.opacity = 1;
                        } else {
                            // Fade out, swap, fade in
                            comicImg.style.opacity = 0;
                            setTimeout(() => {
                                comicImg.src = activeMilestone.img;
                                comicImg.onload = () => {
                                    comicImg.style.opacity = 1;
                                };
                            }, 300); // Wait for CSS transition (0.3s)
                        }
                    }
                } else {
                    comicContainer.style.display = 'none';
                }
            } else {
                comicContainer.style.display = 'none';
            }
        });

        const bgmPlayer = document.getElementById('bgm-player');
        
        mainPlayer.addEventListener('play', () => {
            const currentSrc = mainPlayer.getAttribute('src');
            // If there's a BGM track, ensure it is loaded and volume is applied
            const track = bgmTracks[currentSrc];
            if (track) {
                const src = typeof track === 'string' ? track : track.src;
                const vol = typeof track === 'string' ? 0.2 : (track.volume || 0.2);
                
                if (!bgmPlayer.src || bgmPlayer.src.indexOf(src) === -1) {
                    bgmPlayer.src = src;
                }
                bgmPlayer.volume = vol;
                bgmPlayer.play().catch(e => console.log("BGM play blocked:", e));
            } else {
                bgmPlayer.pause();
                bgmPlayer.src = '';
            }
        });

        mainPlayer.addEventListener('pause', () => {
            bgmPlayer.pause();
        });

        document.addEventListener('play', function(e){
            var audios = document.getElementsByTagName('audio');
            for(var i = 0, len = audios.length; i < len;i++){
                if(audios[i] != e.target && audios[i].id !== 'bgm-player' && e.target.id !== 'bgm-player'){ 
                    audios[i].pause(); 
                }
            }
        }, true);
    </script>
</body>
</html>
