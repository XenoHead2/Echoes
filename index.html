<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes in the Fabric</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --blur: blur(12px); }
       body {
    background: radial-gradient(circle at center, #1a1a1f 0%, #050505 100%);
    background-attachment: fixed;
    color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .container { max-width: 900px; padding: 40px; }
        .chapter-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px) saturate(150%); /* High-end frosted glass */
    border: 1px solid rgba(0, 212, 255, 0.2); /* Subtle blue glow border */
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    transition: transform 0.3s ease, border 0.3s ease;
}

.chapter-card:hover {
    transform: translateY(-5px); /* Lift effect on hover */
    border: 1px solid rgba(0, 212, 255, 0.5);
}
        .render-img { width: 100%; border-radius: 8px; border: 1px solid #444; }
        h1, h2 { letter-spacing: 2px; text-transform: uppercase; color: #00d4ff; }
        audio { width: 100%; margin-top: 15px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Echoes in the Fabric</h1>
        <div class="chapter-card">
            <img src="images/intro_render.png" class="render-img" alt="World of Dorin">
            <div>
                <h2>Introduction</h2>
                <p>On the distant world of Dorin, life clings to existence within sprawling, self-sustaining domed cities like Veridia...</p>
                <audio controls src="audio/intro.mp3"></audio>
            </div>
        </div>
        <!-- Repeat .chapter-card for all 17 chapters -->
    </div>
    <script>
        document.addEventListener('play', function(e){
            var audios = document.getElementsByTagName('audio');
            for(var i = 0, len = audios.length; i < len;i++){
                if(audios[i] != e.target){ audios[i].pause(); }
            }
        }, true);
    </script>
</body>
</html>
